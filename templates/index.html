<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeNest — Fire Detection</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & Base ───────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --dark:    #233d4d;
            --orange:  #fe7f2d;
            --yellow:  #fcca46;
            --green:   #a1c181;
            --teal:    #619b8a;
            --bg:      #1a2e38;
            --surface: #2a4a5a;
            --text:    #f0f0f0;
            --muted:   #8eaab8;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Top Bar ────────────────────────────────── */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,.35);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: .5px;
            color: var(--yellow);
        }

        .brand svg { width: 28px; height: 28px; }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* status badge in topbar */
        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: .8rem;
            font-weight: 600;
            background: rgba(255,255,255,.08);
            color: var(--muted);
            transition: all .3s;
        }
        .status-pill.live { background: rgba(254,127,45,.18); color: var(--orange); }
        .status-pill .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--muted);
            transition: background .3s;
        }
        .status-pill.live .dot {
            background: var(--orange);
            animation: pulse-dot 1.4s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .4; transform: scale(.7); }
        }

        /* settings gear */
        .gear-btn {
            width: 40px; height: 40px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,.07);
            color: var(--text);
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: background .25s, transform .25s;
        }
        .gear-btn:hover { background: rgba(255,255,255,.14); transform: rotate(30deg); }
        .gear-btn svg { width: 22px; height: 22px; }

        /* ── Settings Dropdown ──────────────────────── */
        .settings-anchor { position: relative; }

        .settings-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            width: 360px;
            max-height: 80vh;
            overflow-y: auto;
            background: var(--dark);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 16px 48px rgba(0,0,0,.5);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-8px);
            transition: opacity .25s, transform .25s;
            z-index: 200;
        }
        .settings-dropdown.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .settings-dropdown h3 {
            font-size: .95rem;
            font-weight: 700;
            color: var(--yellow);
            margin-bottom: 14px;
        }

        .settings-dropdown h4 {
            font-size: .82rem;
            font-weight: 600;
            color: var(--orange);
            margin-top: 18px;
            margin-bottom: 10px;
        }

        .field { margin-bottom: 14px; }
        .field label {
            display: block;
            font-size: .78rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .field input[type="text"],
        .field select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 8px;
            background: rgba(0,0,0,.25);
            color: var(--text);
            font-size: .88rem;
            font-family: inherit;
            outline: none;
            transition: border-color .2s;
        }
        .field input[type="text"]:focus,
        .field select:focus { border-color: var(--teal); }
        .field input[type="text"]::placeholder { color: #506a78; }
        .field small { font-size: .72rem; color: #506a78; margin-top: 3px; display: block; }

        .field input[type="range"] {
            width: 100%;
            accent-color: var(--orange);
            margin-top: 2px;
        }

        .field .range-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .field .range-row span {
            font-size: .78rem;
            font-weight: 600;
            color: var(--orange);
            min-width: 32px;
            text-align: right;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .84rem;
            color: var(--text);
            margin-bottom: 8px;
            cursor: pointer;
        }
        .checkbox-row input[type="checkbox"] { accent-color: var(--teal); }

        .btn-save {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 10px;
            background: var(--teal);
            color: #fff;
            font-size: .9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 8px;
            transition: background .2s, transform .15s;
        }
        .btn-save:hover { background: #4e8877; transform: translateY(-1px); }
        .btn-save:active { transform: translateY(0); }

        /* ── Main Content ───────────────────────────── */
        .main {
            padding-top: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 80px 24px 24px;
        }

        .video-card {
            position: relative;
            width: 100%;
            max-width: 960px;
            background: #0d1b22;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 12px 48px rgba(0,0,0,.45);
            border: 1px solid rgba(255,255,255,.06);
        }

        .video-card img {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: #0a1418;
        }

        /* controls bar below video */
        .video-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 20px;
            background: var(--dark);
        }

        .vc-btn {
            padding: 10px 28px;
            border: none;
            border-radius: 10px;
            font-size: .88rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: transform .15s, box-shadow .2s;
        }
        .vc-btn:hover { transform: translateY(-2px); }
        .vc-btn:active { transform: translateY(0); }

        .vc-start {
            background: var(--green);
            color: #1a3a1a;
        }
        .vc-start:hover { box-shadow: 0 4px 18px rgba(161,193,129,.4); }

        .vc-stop {
            background: #d9534f;
            color: #fff;
        }
        .vc-stop:hover { box-shadow: 0 4px 18px rgba(217,83,79,.4); }

        /* stats in control bar */
        .vc-stats {
            display: flex;
            gap: 20px;
            margin-left: auto;
            font-size: .8rem;
            color: var(--muted);
        }
        .vc-stats .stat-num {
            font-weight: 700;
            font-size: .95rem;
            color: var(--yellow);
        }

        /* ── Fire Notification Toast ────────────────── */
        .fire-toast {
            position: fixed;
            top: 72px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            color: #fff;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 32px rgba(231,76,60,.55);
            opacity: 0;
            pointer-events: none;
            transition: opacity .35s, transform .35s;
            z-index: 300;
        }
        .fire-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .fire-toast svg { width: 24px; height: 24px; flex-shrink: 0; }

        /* ── Logs Panel (bottom-right) ──────────────── */
        .logs-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 50px; height: 50px;
            border: none;
            border-radius: 14px;
            background: var(--dark);
            color: var(--yellow);
            cursor: pointer;
            display: grid;
            place-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,.4);
            transition: transform .2s, box-shadow .2s;
            z-index: 150;
        }
        .logs-toggle:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 28px rgba(0,0,0,.55);
        }
        .logs-toggle svg { width: 24px; height: 24px; }

        /* badge count on the log button */
        .logs-toggle .notif-badge {
            position: absolute;
            top: -5px; right: -5px;
            min-width: 20px; height: 20px;
            background: #e74c3c;
            color: #fff;
            font-size: .68rem;
            font-weight: 700;
            border-radius: 10px;
            display: none;
            place-items: center;
            padding: 0 5px;
        }
        .logs-toggle .notif-badge.visible { display: grid; }

        .logs-panel {
            position: fixed;
            bottom: 84px;
            right: 24px;
            width: 380px;
            max-height: 420px;
            background: var(--dark);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 14px;
            box-shadow: 0 12px 48px rgba(0,0,0,.5);
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transform: translateY(12px);
            transition: opacity .25s, transform .25s;
            z-index: 140;
        }
        .logs-panel.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .logs-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255,255,255,.06);
            font-weight: 600;
            font-size: .92rem;
            color: var(--yellow);
        }
        .logs-header button {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: .78rem;
            font-family: inherit;
        }
        .logs-header button:hover { color: var(--text); }

        .logs-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
        }

        .log-entry {
            padding: 8px 10px;
            margin-bottom: 6px;
            border-radius: 8px;
            font-size: .8rem;
            background: rgba(255,255,255,.04);
            display: flex;
            gap: 8px;
            line-height: 1.4;
        }
        .log-entry.detection {
            background: rgba(231,76,60,.15);
            border-left: 3px solid #e74c3c;
        }
        .log-entry .time {
            color: #506a78;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        /* ── Scrollbar ──────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 3px; }

        /* ── Responsive ─────────────────────────────── */
        @media (max-width: 600px) {
            .topbar { padding: 0 14px; }
            .brand { font-size: 1.1rem; }
            .settings-dropdown { width: calc(100vw - 28px); right: -10px; }
            .video-card { border-radius: 12px; }
            .logs-panel { width: calc(100vw - 48px); right: 14px; bottom: 80px; }
            .logs-toggle { right: 14px; bottom: 16px; }
            .vc-stats { display: none; }
        }
    </style>
</head>
<body>

    <!-- ── Top Bar ──────────────────────────────── -->
    <header class="topbar">
        <div class="brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            SafeNest
        </div>

        <div class="topbar-right">
            <div id="status-pill" class="status-pill">
                <span class="dot"></span>
                <span id="status-text">Arrêté</span>
            </div>

            <div class="settings-anchor">
                <button class="gear-btn" id="gear-btn" aria-label="Paramètres">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.32 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>

                <!-- Settings Dropdown -->
                <div class="settings-dropdown" id="settings-dropdown">
                    <h3>⚙️ Paramètres</h3>

                    <div class="field">
                        <label>📹 URL Caméra IP</label>
                        <input type="text" id="video-url" placeholder="http://192.168.1.100:8081/video">
                        <small>Laisser vide pour utiliser la webcam</small>
                    </div>

                    <div class="field">
                        <label>🎥 Index Webcam</label>
                        <select id="camera-index">
                            <option value="0" selected>0 — Caméra par défaut</option>
                            <option value="1">1 — Caméra secondaire</option>
                            <option value="2">2 — Autre caméra</option>
                        </select>
                    </div>

                    <div class="field">
                        <div class="range-row">
                            <label>🔍 FPS Analyse</label>
                            <span id="fps-value">10</span>
                        </div>
                        <input type="range" id="analysis-fps" min="1" max="30" value="10">
                    </div>

                    <div class="field">
                        <div class="range-row">
                            <label>🎯 Sensibilité feu</label>
                            <span id="sensitivity-value">70%</span>
                        </div>
                        <input type="range" id="fire-sensitivity" min="0" max="100" value="70">
                    </div>

                    <h4>☀️ Filtres Anti-Éblouissement</h4>

                    <label class="checkbox-row">
                        <input type="checkbox" id="auto-exposure" checked>
                        Auto-correction exposition
                    </label>

                    <label class="checkbox-row">
                        <input type="checkbox" id="reduce-glare" checked>
                        Réduire éblouissement soleil
                    </label>

                    <div class="field">
                        <div class="range-row">
                            <label>🌓 Correction gamma</label>
                            <span id="gamma-value">0.8</span>
                        </div>
                        <input type="range" id="gamma-correction" min="0.3" max="1.5" step="0.1" value="0.8">
                        <small>&lt; 1 = assombrir (soleil) &nbsp;|&nbsp; &gt; 1 = éclaircir</small>
                    </div>

                    <button class="btn-save" onclick="saveConfig()">Sauvegarder</button>
                </div>
            </div>
        </div>
    </header>

    <!-- ── Fire Toast Notification ──────────────── -->
    <div class="fire-toast" id="fire-toast">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 23c-3.6 0-7-2.4-7-7 0-3.1 2.1-5.7 4-7.6l.7-.8c.4-.4 1.1-.1 1.1.5v2.7c0 .3.4.5.6.3.8-.8 2-2.3 2.6-4.6.1-.5.8-.6 1 0C17.3 12.3 19 14.9 19 16c0 4.6-3.4 7-7 7z"/></svg>
        <span id="fire-toast-msg">🔥 FEU DÉTECTÉ !</span>
    </div>

    <!-- ── Video Center ─────────────────────────── -->
    <main class="main">
        <div class="video-card">
            <img id="video-feed" src="/video_feed" alt="Video Feed">
            <div class="video-controls">
                <button class="vc-btn vc-start" onclick="startDetection()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Démarrer
                </button>
                <button class="vc-btn vc-stop" onclick="stopDetection()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
                    Arrêter
                </button>
                <div class="vc-stats">
                    <div>Frames <span class="stat-num" id="frame-count">0</span></div>
                    <div>Détections <span class="stat-num" id="detection-count">0</span></div>
                </div>
            </div>
        </div>
    </main>

    <!-- ── Logs Toggle + Panel ──────────────────── -->
    <button class="logs-toggle" id="logs-toggle" aria-label="Voir les logs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span class="notif-badge" id="log-badge">0</span>
    </button>

    <div class="logs-panel" id="logs-panel">
        <div class="logs-header">
            <span>📋 Journal</span>
            <button onclick="clearLogs()">Effacer</button>
        </div>
        <div class="logs-body" id="log-container">
            <div class="log-entry">
                <span class="time">--:--:--</span>
                <span>Système prêt</span>
            </div>
        </div>
    </div>

    <!-- ── Script ───────────────────────────────── -->
    <script>
        const socket = io();
        let isRunning = false;
        let unreadLogs = 0;
        let logsPanelOpen = false;

        /* ── Settings dropdown toggle ─────────────── */
        const gearBtn    = document.getElementById('gear-btn');
        const dropdown   = document.getElementById('settings-dropdown');

        gearBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('open');
        });
        document.addEventListener('click', (e) => {
            if (!dropdown.contains(e.target) && e.target !== gearBtn) {
                dropdown.classList.remove('open');
            }
        });

        /* ── Logs panel toggle ────────────────────── */
        const logsToggle = document.getElementById('logs-toggle');
        const logsPanel  = document.getElementById('logs-panel');
        const logBadge   = document.getElementById('log-badge');

        logsToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            logsPanelOpen = !logsPanelOpen;
            logsPanel.classList.toggle('open', logsPanelOpen);
            if (logsPanelOpen) {
                unreadLogs = 0;
                logBadge.classList.remove('visible');
            }
        });

        document.addEventListener('click', (e) => {
            if (logsPanelOpen && !logsPanel.contains(e.target) && e.target !== logsToggle && !logsToggle.contains(e.target)) {
                logsPanelOpen = false;
                logsPanel.classList.remove('open');
            }
        });

        /* ── Sliders ──────────────────────────────── */
        document.getElementById('analysis-fps').addEventListener('input', function() {
            document.getElementById('fps-value').textContent = this.value;
        });
        document.getElementById('fire-sensitivity').addEventListener('input', function() {
            document.getElementById('sensitivity-value').textContent = this.value + '%';
        });
        document.getElementById('gamma-correction').addEventListener('input', function() {
            document.getElementById('gamma-value').textContent = this.value;
        });

        /* ── Config save / load ───────────────────── */
        async function saveConfig() {
            const response = await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    video_url:        document.getElementById('video-url').value,
                    camera_index:     parseInt(document.getElementById('camera-index').value),
                    analysis_fps:     parseInt(document.getElementById('analysis-fps').value),
                    fire_sensitivity: parseInt(document.getElementById('fire-sensitivity').value),
                    auto_exposure:    document.getElementById('auto-exposure').checked,
                    reduce_glare:     document.getElementById('reduce-glare').checked,
                    gamma_correction: parseFloat(document.getElementById('gamma-correction').value)
                })
            });
            if (response.ok) {
                addLog('⚙️ Configuration sauvegardée');
                dropdown.classList.remove('open');
            }
        }

        async function loadConfig() {
            const response = await fetch('/api/config');
            const d = await response.json();
            document.getElementById('video-url').value              = d.video_url || '';
            document.getElementById('camera-index').value           = d.camera_index;
            document.getElementById('analysis-fps').value           = d.analysis_fps;
            document.getElementById('fps-value').textContent        = d.analysis_fps;
            document.getElementById('fire-sensitivity').value       = d.fire_sensitivity || 70;
            document.getElementById('sensitivity-value').textContent = (d.fire_sensitivity || 70) + '%';
            document.getElementById('auto-exposure').checked        = d.auto_exposure !== false;
            document.getElementById('reduce-glare').checked         = d.reduce_glare !== false;
            document.getElementById('gamma-correction').value       = d.gamma_correction || 0.8;
            document.getElementById('gamma-value').textContent      = d.gamma_correction || 0.8;
        }

        /* ── Socket events ────────────────────────── */
        socket.on('detection', function(data) {
            if (data.detected) {
                showFireToast(data.message || '🔥 FEU DÉTECTÉ !');
                addLog('🔥 Feu détecté ! (Total: ' + data.count + ')', true);
                document.getElementById('detection-count').textContent = data.count;
            }
        });

        /* ── Fire toast ───────────────────────────── */
        let toastTimer = null;
        function showFireToast(msg) {
            const toast = document.getElementById('fire-toast');
            document.getElementById('fire-toast-msg').textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        /* ── Logs ─────────────────────────────────── */
        function addLog(message, isDetection) {
            isDetection = isDetection || false;
            const container = document.getElementById('log-container');
            const time = new Date().toLocaleTimeString('fr-FR');
            const entry = document.createElement('div');
            entry.className = 'log-entry' + (isDetection ? ' detection' : '');
            entry.innerHTML = '<span class="time">' + time + '</span><span>' + message + '</span>';
            container.insertBefore(entry, container.firstChild);

            while (container.children.length > 30) container.removeChild(container.lastChild);

            if (!logsPanelOpen) {
                unreadLogs++;
                logBadge.textContent = unreadLogs > 9 ? '9+' : unreadLogs;
                logBadge.classList.add('visible');
            }
        }

        function clearLogs() {
            document.getElementById('log-container').innerHTML = '';
            addLog('Journal effacé');
        }

        /* ── Status badge ─────────────────────────── */
        function updateBadge(status) {
            const pill = document.getElementById('status-pill');
            const text = document.getElementById('status-text');
            if (status === 'live') {
                pill.classList.add('live');
                text.textContent = 'LIVE';
            } else {
                pill.classList.remove('live');
                text.textContent = 'Arrêté';
            }
        }

        /* ── Controls ─────────────────────────────── */
        function startDetection() {
            socket.emit('start_detection');
            isRunning = true;
            updateBadge('live');
            addLog('▶️ Détection démarrée');
            startStatusPolling();
        }

        function stopDetection() {
            socket.emit('stop_detection');
            isRunning = false;
            updateBadge('stopped');
            addLog('⏹️ Détection arrêtée');
        }

        function startStatusPolling() {
            var poll = async function() {
                if (!isRunning) return;
                var response = await fetch('/api/stats');
                var data = await response.json();
                document.getElementById('frame-count').textContent     = data.frame_count;
                document.getElementById('detection-count').textContent = data.detection_count;
                if (data.running) {
                    setTimeout(poll, 1000);
                } else {
                    isRunning = false;
                    updateBadge('stopped');
                }
            };
            poll();
        }

        /* ── Init ─────────────────────────────────── */
        fetch('/api/stats').then(function(r) { return r.json(); }).then(function(data) {
            if (data.running) {
                isRunning = true;
                updateBadge('live');
                startStatusPolling();
            }
        });
        loadConfig();
    </script>
</body>
</html>
